<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no,date=no,address=no,email=no,url=no">
  <title>Allof — Dinner, handled.</title>
  <meta name="description" content="Allof plans your family's meals, generates recipes, and builds your grocery list automatically — and gets smarter every week.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0,400;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #FAFAF8;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      max-width: 640px;
      width: 100%;
      padding: 0 28px;
    }

    /* ── Header ── */

    header {
      padding: 44px 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #1A1A1A;
    }

    .header-rule {
      border: none;
      border-top: 1px solid #E8E3DD;
      margin: 0;
    }

    /* ── Hero ── */

    .hero {
      padding: 88px 0 64px;
      text-align: center;
    }

    .headline {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(52px, 10.5vw, 76px);
      letter-spacing: -0.015em;
      line-height: 1.05;
      color: #1A1A1A;
      margin-bottom: 28px;
    }

    .subhead {
      font-family: 'Inter', sans-serif;
      font-size: clamp(15.5px, 2.5vw, 18px);
      font-weight: 400;
      line-height: 1.68;
      color: #444444;
      margin-bottom: 18px;
    }

    .free-line {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #888888;
      text-transform: uppercase;
    }

    /* ── Waitlist ── */

    .waitlist {
      padding-bottom: 100px;
      text-align: center;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .email-input {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #1A1A1A;
      background: #FFFFFF;
      border: 1.5px solid #E2DEDB;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.12s ease;
      appearance: none;
      -webkit-appearance: none;
      text-align: left;
    }

    .email-input::placeholder {
      color: #BBBBBB;
    }

    .email-input:focus {
      border-color: #AAAAAA;
    }

    .submit-btn {
      flex-shrink: 0;
      height: 48px;
      padding: 0 22px;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: #FFFFFF;
      background: #3A5931;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease;
    }

    .submit-btn:hover {
      background: #2E4625;
    }

    .submit-btn:active {
      background: #253A1E;
    }

    .form-note {
      font-size: 13.5px;
      line-height: 1.6;
      color: #888888;
      margin-bottom: 12px;
    }

    .waitlist-count {
      font-size: 13.5px;
      color: #888888;
    }

    .waitlist-count strong {
      color: #555555;
      font-weight: 500;
    }

    /* ── Mobile ── */

    @media (max-width: 500px) {
      .page {
        padding: 0 22px;
      }

      header {
        padding: 32px 0 28px;
      }

      .hero {
        padding: 64px 0 48px;
      }

      .form-row {
        flex-direction: column;
        gap: 10px;
      }

      .submit-btn {
        height: 50px;
        width: 100%;
        font-size: 15px;
      }

      .waitlist {
        padding-bottom: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .submit-btn {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <a href="/" class="wordmark">all of</a>
    </header>

    <hr class="header-rule">

    <main>
      <section class="hero">
        <h1 class="headline">Dinner, handled.</h1>
        <p class="subhead">Allof plans your family's meals, generates recipes, and builds your grocery list automatically — and gets smarter every week.</p>
        <p class="free-line">Free &nbsp;·&nbsp; No subscription &nbsp;·&nbsp; No catch</p>
      </section>

      <section class="waitlist">
        <form id="waitlist-form">
          <input type="hidden" name="tags" value="2216256">
          <div style="position:absolute;left:-5000px" aria-hidden="true">
            <input type="text" name="b_13ef2d1c562c5cb19bf4a78d3_c8f5393bd0" tabindex="-1" value="">
          </div>
          <div class="form-row">
            <input type="email" id="email-input" name="EMAIL" class="email-input" placeholder="Your email address" autocomplete="email" required>
            <button type="submit" class="submit-btn">Request early access</button>
          </div>
          <p class="form-note">We're rolling out access in small groups. You'll hear from us when your spot is ready.</p>
        </form>

        <script>
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
          e.preventDefault();

          const email = document.getElementById('email-input').value;
          const url = 'https://app.us16.list-manage.com/subscribe/post?u=13ef2d1c562c5cb19bf4a78d3&id=c8f5393bd0&f_id=00c81de1f0';

          const formData = new FormData();
          formData.append('EMAIL', email);
          formData.append('tags', '2216256');
          formData.append('b_13ef2d1c562c5cb19bf4a78d3_c8f5393bd0', '');

          fetch(url, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
          }).then(() => {
            window.location.href = '/thanks';
          }).catch(() => {
            window.location.href = '/thanks';
          });
        });
        </script>
      </section>
    </main>

  </div>
</body>
</html>
